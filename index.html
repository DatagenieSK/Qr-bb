<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BB Schedule Pro - Sk Alauddin</title>
   
    <style>
        /* --- VARIABLES & RESET --- */
        :root {
            --bb-green: #84c225;
            --bb-green-glow: rgba(132, 194, 37, 0.4);
            --bg-dark: #121212;
            --card-dark: #1e1e1e;
            --text-light: #e0e0e0;
        }

        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-dark);
            color: var(--text-light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            position: relative;
            padding: 20px;
            overflow: hidden;
        }

        /* --- FLOATING EMOJI BACKGROUND --- */
        .emoji-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
            opacity: 0.15;
            overflow: hidden;
        }
       
        .floating-emoji {
            position: absolute;
            font-size: 3rem;
            animation: float 10s infinite ease-in-out;
        }

        @keyframes float {
            0% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(10deg); }
            100% { transform: translateY(0) rotate(0deg); }
        }

        /* --- MAIN CARD --- */
        .card {
            background: var(--card-dark);
            width: 100%;
            max-width: 400px;
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            text-align: center;
            position: relative;
            z-index: 10;
            border: 1px solid #333;
            animation: slideUp 0.6s cubic-bezier(0.2, 0.8, 0.2, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(50px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* --- HEADER --- */
        .header {
            background: linear-gradient(135deg, var(--bb-green), #6a9e1b);
            color: #fff;
            padding: 15px;
            font-size: 18px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .live-badge {
            background: rgba(255,255,255,0.2);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .dot {
            width: 8px; height: 8px;
            background-color: #fff;
            border-radius: 50%;
            animation: blink 1s infinite;
        }

        @keyframes blink { 50% { opacity: 0; } }

        .content {
            padding: 20px;
        }

        /* --- SCHEDULE MAINTAIN ANIMATION --- */
        .maintenance-container {
            background: #252525;
            border: 1px solid #333;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
            text-align: left;
        }

        .m-header {
            font-size: 12px;
            color: #888;
            margin-bottom: 10px;
            text-transform: uppercase;
            display: flex;
            justify-content: space-between;
        }

        .m-status {
            color: var(--bb-green);
            font-weight: bold;
        }

        .anim-bar-bg {
            width: 100%;
            height: 6px;
            background: #333;
            border-radius: 3px;
            overflow: hidden;
            position: relative;
        }

        .anim-bar-fill {
            height: 100%;
            width: 40%;
            background: var(--bb-green);
            box-shadow: 0 0 10px var(--bb-green);
            position: absolute;
            border-radius: 3px;
            animation: scan 2s infinite ease-in-out;
        }

        @keyframes scan {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        .data-row {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            font-family: monospace;
            color: #aaa;
        }

        /* --- VIDEO PLAYER --- */
        .video-wrapper {
            width: 100%;
            border-radius: 10px;
            overflow: hidden;
            border: 2px solid #333;
            position: relative;
            background: black;
            min-height: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        video {
            width: 100%;
            height: auto;
            display: block;
        }

        /* Overlay to prompt user if autoplay fails */
        .tap-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.6);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            cursor: pointer;
            z-index: 20;
            display: none; /* Hidden by default */
            flex-direction: column;
        }
        .tap-overlay span { font-size: 30px; margin-bottom: 10px; }

        /* --- FOOTER --- */
        .credit {
            margin-top: 20px;
            padding-top: 15px;
            border-top: 1px solid #333;
            font-size: 11px;
            color: #666;
            letter-spacing: 1px;
        }
        .credit span { color: var(--bb-green); font-weight: bold; }

    </style>
</head>
<body onclick="enableAudio()">

    <div class="emoji-bg">
        <div class="floating-emoji" style="top: 10%; left: 10%;">🥦</div>
        <div class="floating-emoji" style="top: 20%; right: 15%;">🥕</div>
        <div class="floating-emoji" style="bottom: 15%; left: 20%;">🚚</div>
        <div class="floating-emoji" style="bottom: 30%; right: 10%;">⏰</div>
    </div>

    <div class="card">
        <div class="header">
            <span>Dashboard</span>
            <div class="live-badge"><div class="dot"></div> LIVE</div>
        </div>
       
        <div class="content">
           
            <div class="maintenance-container">
                <div class="m-header">
                    <span>System Status</span>
                    <span class="m-status">MAINTAINING SCHEDULE</span>
                </div>
                <div class="anim-bar-bg">
                    <div class="anim-bar-fill"></div>
                </div>
                <div class="data-row">
                    <span id="timer">00:00:00</span>
                    <span>SYNC: ACTIVE</span>
                </div>
            </div>

            <div class="video-wrapper">
                <video id="bbVideo" playsinline loop autoplay>
                    <source src="bb.mp4" type="video/mp4">
                    Your browser does not support the video tag.
                </video>
                <div id="tapOverlay" class="tap-overlay" onclick="enableAudio()">
                    <span>🔊</span>
                    TAP TO UNMUTE
                </div>
            </div>

            <div class="credit">DESIGNED BY <span>SK ALAUDDIN</span></div>
        </div>
    </div>

    <script>
        // --- TIMER LOGIC ---
        function updateTimer() {
            const now = new Date();
            const timeString = now.toLocaleTimeString();
            document.getElementById('timer').innerText = timeString;
        }
        setInterval(updateTimer, 1000);
        updateTimer();

        // --- AUTOPLAY LOGIC ---
        const video = document.getElementById('bbVideo');
        const overlay = document.getElementById('tapOverlay');

        // 1. Try to play immediately on load
        window.addEventListener('load', function() {
            // We do NOT mute it, we try to play with sound
            var promise = video.play();

            if (promise !== undefined) {
                promise.then(_ => {
                    // Autoplay started!
                    overlay.style.display = "none";
                }).catch(error => {
                    // Autoplay was prevented. Show overlay to ask for interaction.
                    console.log("Autoplay blocked by browser policy. Waiting for user interaction.");
                    overlay.style.display = "flex";
                });
            }
        });

        // 2. Global Unmute/Play Function
        // This is called when the user clicks the body or the overlay
        function enableAudio() {
            if(video.paused || video.muted) {
                video.muted = false;
                video.volume = 1.0;
                video.play();
                overlay.style.display = "none";
            }
        }
    </script>
</body>
</html>
